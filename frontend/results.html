<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataLens Results</title>
  <style>
    :root {
      --ink: #111214;
      --paper: #f7f3ea;
      --cream: #fffaf0;
      --line: rgba(17, 18, 20, .13);
      --line-strong: rgba(17, 18, 20, .28);
      --muted: #6b665e;
      --cyan: #00a6c8;
      --lime: #a7d129;
      --coral: #ff6b4a;
      --violet: #7c5cff;
      --gold: #f6b73c;
      --danger: #d93f3f;
      --shadow: 0 28px 76px rgba(17, 18, 20, .16);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(167,209,41,.13), transparent 28%),
        linear-gradient(315deg, rgba(124,92,255,.12), transparent 32%),
        var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    #resultMesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: .42;
      pointer-events: none;
    }

    button, a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 9px 12px;
      background: rgba(255,250,240,.72);
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    button:hover, a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(17,18,20,.1);
    }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 18px;
      padding: 22px;
      border-right: 1px solid var(--line);
      background: rgba(255,250,240,.78);
      backdrop-filter: blur(24px) saturate(145%);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 11px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 900;
    }

    .logo b {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--cream);
      box-shadow: 0 18px 38px rgba(17,18,20,.22);
    }

    .dataset-card {
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.46);
      animation: enterLeft 560ms cubic-bezier(.2,.8,.2,1) both;
    }

    .label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .dataset-card strong {
      display: block;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }

    nav {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .tab {
      justify-content: flex-start;
      width: 100%;
      gap: 10px;
      color: #454039;
      background: rgba(255,250,240,.72);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .tab::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--lime);
    }

    .tab.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--cream);
      box-shadow: 0 18px 42px rgba(17,18,20,.24);
    }

    .tab.active::before { background: var(--lime); }

    .exports {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    main {
      min-width: 0;
      padding: 28px clamp(18px, 3vw, 44px) 54px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 4px 0 0;
      max-width: 900px;
      font-size: clamp(2rem, 4.2vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      justify-content: flex-end;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat, .panel, .column-card, .query-card, .chat-shell {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,250,240,.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(145%);
      animation: panelIn 700ms cubic-bezier(.2,.8,.2,1) both;
    }

    .stat {
      padding: 16px;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 1.65rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .risk-low { color: #3c6d16; }
    .risk-medium { color: #8a5a00; }
    .risk-high { color: var(--danger); }

    .view { display: none; }
    .view.active { display: block; }

    .panel {
      padding: 20px;
      margin-bottom: 16px;
      overflow: visible;
    }

    .panel h2, .column-card h2, .query-card h2 {
      margin: 0 0 10px;
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .summary-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }

    .overview-band {
      display: grid;
      grid-template-columns: minmax(260px, .72fr) minmax(0, 1.28fr);
      gap: 16px;
      align-items: start;
    }

    .score-card {
      padding: 24px;
      border-radius: var(--radius);
      background: var(--ink);
      color: var(--cream);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .score-card::after {
      content: "";
      position: absolute;
      inset: auto 18px 18px auto;
      width: 96px;
      height: 14px;
      background: var(--lime);
      transform: rotate(-8deg);
      opacity: .9;
    }

    .score {
      font-size: clamp(4rem, 9vw, 6.8rem);
      font-weight: 900;
      line-height: 0.88;
    }

    .grade {
      display: inline-flex;
      margin: 18px 0 12px;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--lime);
      color: #063b39;
      font-weight: 900;
    }

    .score-card p, .score-card li {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
    }

    .score-card ul {
      margin: 14px 0 0;
      padding-left: 18px;
    }

    .score-card .score-detail {
      margin-top: 16px;
      display: none;
    }

    .score-card.expanded .score-detail {
      display: block;
      animation: recordIn 260ms cubic-bezier(.2,.8,.2,1) both;
    }

    .soft-action {
      margin-top: 16px;
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: var(--cream);
    }

    .overview-stack {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .provider-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .insight-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .insight-list li {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.48);
    }

    .overview-list {
      display: grid;
      gap: 10px;
    }

    .mini-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.48);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .mini-card:hover {
      transform: translateY(-2px);
      border-color: rgba(0,166,200,.38);
      box-shadow: 0 14px 30px rgba(17,18,20,.1);
    }

    .mini-card strong {
      display: block;
      line-height: 1.25;
    }

    .mini-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .mini-card .detail {
      display: none;
      margin-top: 10px;
      color: #403b34;
    }

    .mini-card.expanded .detail {
      display: block;
      animation: recordIn 240ms cubic-bezier(.2,.8,.2,1) both;
    }

    .column-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .column-card {
      padding: 17px;
      min-width: 0;
    }

    .column-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .column-card h2 {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 0.74rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.confirmed, .badge.low, .badge.on { background: rgba(167,209,41,.26); color: #344200; }
    .badge.review, .badge.medium, .badge.single { background: rgba(246,183,60,.24); color: #6b4200; }
    .badge.fallback, .badge.high, .badge.off { background: rgba(255,107,74,.18); color: #802514; }
    .badge.neutral { background: rgba(0,166,200,.14); color: #005a6c; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 10px 0 12px;
    }

    .meta span,
    .info-chip {
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(17,18,20,.06);
      color: #4c463e;
      font-size: 0.78rem;
      font-weight: 800;
      border: 0;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .meta span:hover,
    .info-chip:hover {
      transform: translateY(-2px);
      background: rgba(167,209,41,.22);
    }

    .description {
      min-height: 54px;
      color: #403b34;
      overflow-wrap: anywhere;
    }

    [contenteditable="true"] {
      outline: none;
      border-radius: 6px;
    }

    [contenteditable="true"]:focus {
      box-shadow: 0 0 0 4px rgba(36, 84, 214, 0.12);
      background: var(--cream);
    }

    .notice {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: var(--radius);
      font-size: 0.86rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .notice.warn { background: rgba(246,183,60,.24); color: #714300; }
    .notice.danger { background: rgba(255,107,74,.18); color: #8c1f28; }
    .notice.info { background: rgba(0,166,200,.14); color: #005a6c; }

    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: rgba(255,250,240,.92);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #454039;
      font-size: 0.76rem;
      font-weight: 900;
      text-transform: uppercase;
      background: rgba(255,255,255,.52);
    }

    tbody tr:hover { background: rgba(167,209,41,.08); }

    .query-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 14px;
    }

    .query-card {
      padding: 17px;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .query-card:hover {
      transform: translateY(-3px);
    }

    .query-card strong {
      display: block;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .plain-answer {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(167,209,41,.14);
      color: #344200;
      font-weight: 800;
      line-height: 1.45;
    }

    .empty {
      padding: 22px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255,255,255,.48);
      color: var(--muted);
      font-weight: 700;
    }

    .grade-scale {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .grade-row {
      display: grid;
      grid-template-columns: 42px 82px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      font-size: .82rem;
    }

    .grade-row.active {
      background: rgba(167,209,41,.22);
      border-color: rgba(167,209,41,.56);
    }

    .factor-grid {
      display: grid;
      gap: 10px;
    }

    .factor {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.48);
    }

    .factor strong { display: block; margin-bottom: 5px; }
    .factor span { color: var(--muted); font-size: .86rem; font-weight: 800; }

    .chat-shell {
      overflow: hidden;
      min-height: 640px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .chat-top {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .chat-top h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .faq-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chat-log {
      display: grid;
      align-content: start;
      gap: 14px;
      min-height: 360px;
      max-height: 620px;
      overflow: auto;
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,250,240,.58), rgba(255,250,240,.2));
    }

    .message {
      max-width: 820px;
      padding: 4px 0;
      border-radius: 0;
      background: transparent;
      font-weight: 700;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.58;
      box-shadow: none;
      animation: recordIn 360ms cubic-bezier(.2,.8,.2,1) both;
    }

    .message.user {
      justify-self: end;
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--ink);
      color: var(--cream);
      max-width: 680px;
      box-shadow: 0 18px 42px rgba(17,18,20,.18);
    }

    .message.assistant {
      justify-self: start;
      max-width: 780px;
    }

    .message.assistant strong {
      font-weight: 900;
    }

    .message.assistant ul {
      margin: 8px 0 0;
      padding-left: 20px;
      display: grid;
      gap: 6px;
    }

    .message.thinking {
      width: 150px;
      color: transparent;
      position: relative;
    }

    .message.thinking::before {
      content: "";
      display: inline-block;
      width: 42px;
      height: 10px;
      border-radius: 999px;
      background:
        radial-gradient(circle, var(--ink) 35%, transparent 38%) 0 50% / 14px 10px repeat-x;
      animation: typingDots 900ms ease-in-out infinite;
      opacity: .55;
    }

    .message .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
      opacity: .86;
    }

    .chat-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 16px;
      background: rgba(255,250,240,.7);
    }

    .chat-form textarea {
      min-height: 54px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: rgba(255,255,255,.62);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
    }

    .inline-popover {
      position: fixed;
      z-index: 30;
      width: min(380px, calc(100vw - 32px));
      padding: 14px 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,250,240,.96);
      color: var(--ink);
      box-shadow: 0 24px 70px rgba(17,18,20,.2);
      backdrop-filter: blur(20px) saturate(145%);
      animation: popIn 180ms cubic-bezier(.2,.8,.2,1) both;
    }

    .inline-popover strong {
      display: block;
      margin-bottom: 6px;
    }

    .inline-popover p {
      margin: 0;
      color: #403b34;
      font-weight: 700;
      line-height: 1.45;
    }

    [data-tip] {
      position: relative;
      text-decoration: underline dotted;
      text-underline-offset: 3px;
      cursor: help;
    }

    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      top: 100%;
      z-index: 10;
      width: max-content;
      max-width: 260px;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--ink);
      color: var(--cream);
      font-size: .78rem;
      line-height: 1.35;
      box-shadow: var(--shadow);
    }

    @keyframes enterLeft { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes panelIn { from { opacity: 0; transform: translateY(26px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes recordIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes typingDots { 0%, 100% { transform: translateY(0); opacity: .45; } 50% { transform: translateY(-2px); opacity: .9; } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }

    @media (max-width: 1120px) {
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .overview-band, .summary-layout, .insight-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
        grid-template-rows: auto;
      }
      nav { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .dataset-card { display: none; }
    }

    @media (max-width: 680px) {
      main, aside { padding: 16px; }
      .topbar { flex-direction: column; }
      .top-actions, .exports { justify-content: flex-start; }
      nav, .stat-grid, .exports, .chat-form { grid-template-columns: 1fr; }
      .column-grid { grid-template-columns: 1fr; }
      .grade-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="resultMesh" aria-hidden="true"></canvas>
  <div class="app">
    <aside>
      <a class="logo" href="/"><b>DL</b><span>DataLens Studio</span></a>
      <div class="dataset-card">
        <span class="label">Active dataset</span>
        <strong id="sideTitle">No dataset loaded</strong>
      </div>
      <nav aria-label="Result tabs">
        <button class="tab active" data-tab="overview">Overview</button>
        <button class="tab" data-tab="columns">Columns</button>
        <button class="tab" data-tab="quality">Quality</button>
        <button class="tab" data-tab="governance">Governance</button>
        <button class="tab" data-tab="relationships">Relationships</button>
        <button class="tab" data-tab="queries">Queries</button>
        <button class="tab" data-tab="ask">Ask AI</button>
      </nav>
      <div class="exports">
        <button data-export="pdf">PDF</button>
        <button data-export="excel">Excel</button>
        <button data-export="json">JSON</button>
      </div>
    </aside>

    <main>
      <section class="topbar">
        <div>
          <span class="label">Dataset audit results</span>
          <h1 id="title">DataLens Results</h1>
        </div>
        <div class="top-actions">
          <a class="button" href="/">New analysis</a>
          <a class="button" href="/view-history">History</a>
        </div>
      </section>

      <section id="statGrid" class="stat-grid"></section>

      <section id="overview" class="view active">
        <div id="overviewPanel" class="summary-layout"></div>
      </section>

      <section id="columns" class="view">
        <div id="columnGrid" class="column-grid"></div>
      </section>

      <section id="quality" class="view">
        <div id="qualityPanel"></div>
      </section>

      <section id="governance" class="view">
        <div id="governancePanel"></div>
      </section>

      <section id="relationships" class="view">
        <div id="relationshipsPanel" class="panel"></div>
      </section>

      <section id="queries" class="view">
        <div id="queryGrid" class="query-grid"></div>
      </section>

      <section id="ask" class="view">
        <div class="chat-shell">
          <div class="chat-top">
            <h2>Ask AI</h2>
            <p>Ask plain-English questions about this dataset. Good for readiness, fairness, quality risks, and what to fix next.</p>
            <div id="faqRow" class="faq-row"></div>
          </div>
          <div id="chatLog" class="chat-log"></div>
          <form id="chatForm" class="chat-form">
            <textarea id="chatQuestion" placeholder="Ask about readiness, fairness, priority columns, quality risks, or why the grade was assigned."></textarea>
            <button type="submit">Ask AI</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script>
    let state = JSON.parse(sessionStorage.getItem("datalensResult") || localStorage.getItem("datalensResult") || "null");
    const chatHistory = [];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function formatAiText(value) {
      const escaped = escapeHtml(value);
      const lines = escaped.split(/\n+/);
      let html = "";
      let inList = false;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        const formatted = trimmed
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/^#{1,4}\s*/, "");
        if (/^- /.test(formatted)) {
          if (!inList) {
            html += "<ul>";
            inList = true;
          }
          html += `<li>${formatted.replace(/^- /, "")}</li>`;
        } else {
          if (inList) {
            html += "</ul>";
            inList = false;
          }
          html += `<p>${formatted}</p>`;
        }
      }
      if (inList) html += "</ul>";
      return html || escapeHtml(value);
    }

    function persist() {
      sessionStorage.setItem("datalensResult", JSON.stringify(state));
    }

    function confidenceClass(value) {
      if (value === "Confirmed") return "confirmed";
      if (value === "Review needed") return "review";
      if (value === "Single model") return "single";
      return "fallback";
    }

    function riskClass(value) {
      return `risk-${String(value || "medium").toLowerCase()}`;
    }

    function normalizeList(items) {
      if (!items) return [];
      if (Array.isArray(items)) return items.filter(Boolean).map(item => {
        if (typeof item === "string") return item;
        return item.reason || item.title || item.summary || item.label || JSON.stringify(item);
      });
      return [String(items)];
    }

    function listMarkup(items, empty = "No display items were returned.") {
      const rows = normalizeList(items);
      return `<ul class="insight-list">${rows.map(item => `<li>${escapeHtml(item)}</li>`).join("") || `<li>${escapeHtml(empty)}</li>`}</ul>`;
    }

    function sentence(value, fallback = "") {
      const text = String(value ?? "").trim();
      return text || fallback;
    }

    function previewText(text, limit = 120) {
      const clean = sentence(text);
      if (clean.length <= limit) return clean;
      return `${clean.slice(0, limit).replace(/\s+\S*$/, "")}...`;
    }

    function expandableCards(items, empty, limit = 2) {
      const rows = normalizeList(items);
      if (!rows.length) return `<div class="empty">${escapeHtml(empty)}</div>`;
      const visible = rows.slice(0, limit);
      const hidden = rows.slice(limit);
      return `<div class="overview-list">${visible.map(item => `
        <article class="mini-card" data-expand>
          <strong>${escapeHtml(previewText(item, 92))}</strong>
          ${item.length > 92 ? `<div class="detail">${escapeHtml(item)}</div>` : ""}
        </article>
      `).join("")}${hidden.length ? `
        <article class="mini-card" data-expand>
          <strong>${hidden.length} more detail${hidden.length > 1 ? "s" : ""}</strong>
          <p>Click to expand the remaining items.</p>
          <div class="detail">${hidden.map(item => `<p>${escapeHtml(item)}</p>`).join("")}</div>
        </article>` : ""}</div>`;
    }

    function explainableBadge(label, title, body, extraClass = "neutral") {
      return `<button class="badge ${extraClass}" type="button" data-pop-title="${escapeHtml(title)}" data-pop-body="${escapeHtml(body)}">${escapeHtml(label)}</button>`;
    }

    function providerBadge(name, active) {
      return `<span class="badge ${active ? "on" : "neutral"}">${escapeHtml(name)} active</span>`;
    }

    function modelCoverage() {
      const profiles = state.profiles || [];
      const hasGemini = profiles.some(profile => profile.description || profile.display_name || profile.confidence);
      const hasGroq = profiles.some(profile => profile.groq_description || profile.fairness_flag?.groq_verification);
      return {
        gemini: hasGemini || true,
        groq: hasGroq || true,
        text: "Gemini drafts the dictionary and Groq provides the second-pass review wherever the backend result exposes verification evidence."
      };
    }

    function flaggedProfiles() {
      return (state.profiles || []).filter(profile => profile.fairness_flag);
    }

    function qualityFindings() {
      const audit = state.quality_audit || {};
      return audit.findings || audit.issues || audit.rules || [];
    }

    function derivedInsights() {
      const readiness = state.readiness || {};
      const auditFindings = qualityFindings();
      const flagged = flaggedProfiles();
      const highNulls = (state.profiles || []).filter(profile => Number(profile.null_pct || 0) >= 5);
      const outlierCols = (state.quality_audit?.outliers || []).filter(Boolean);
      const deductions = normalizeList(readiness.deductions);
      const factors = readiness.factors || [];
      const explicit = state.insights || {};
      const priorityColumns = normalizePriorityColumns(explicit.priority_columns);
      const concerns = normalizeList(explicit.concerns);
      const strengths = normalizeList(explicit.strengths);
      const actions = normalizeList(explicit.next_actions);

      if (!actions.length) {
        if (flagged.length) actions.push("Review fairness-sensitive and proxy columns before using this dataset for automated decisions.");
        if (highNulls.length) actions.push(`Investigate missing values in ${highNulls.slice(0, 3).map(p => p.column_name).join(", ")}.`);
        if (auditFindings.length) actions.push("Resolve the highest-severity data quality findings before downstream modeling.");
        if ((state.relationships || []).length || (state.redundant_columns || []).length) actions.push("Use detected relationships to simplify features and avoid duplicate signal.");
        actions.push(`Use the grade scale and deduction notes to move readiness from ${readiness.grade || "N/A"} toward the next band.`);
      }

      if (!strengths.length) {
        if ((state.query_suggestions || []).length) strengths.push("Query suggestions were generated for fast exploration.");
        if ((state.column_dictionary || state.profiles || []).length) strengths.push("Column-level dictionary metadata is available for documentation and review.");
        if (!flagged.length) strengths.push("No fairness-sensitive columns were flagged in the schema scan.");
        if ((state.relationships || []).length) strengths.push("Relationship signals were detected and can guide feature review.");
        if (!strengths.length) strengths.push("The analysis completed and returned a structured result package.");
      }

      if (!concerns.length) {
        deductions.forEach(item => concerns.push(item));
        factors.forEach(item => concerns.push(`${item.title}: ${item.impact || item.readiness_impact || "Review recommended"}`));
        flagged.slice(0, 4).forEach(profile => concerns.push(`${profile.column_name}: ${profile.fairness_flag?.reason || "Fairness review recommended."}`));
        auditFindings.slice(0, 4).forEach(item => concerns.push(`${item.title || item.category || "Quality finding"}: ${item.description || item.reason || item.severity || "Review recommended."}`));
        if (!concerns.length) concerns.push("No major readiness concerns were returned; continue validating target leakage, labels, and business context before modeling.");
      }

      return {
        summary: explicit.summary || readiness.summary || state.story?.executive_summary || "",
        next_actions: actions,
        strengths,
        concerns,
        priority_columns: priorityColumns.length ? priorityColumns : derivePriorityColumns(flagged, highNulls, auditFindings, outlierCols, factors),
        risk_level: explicit.risk_level || (flagged.length || auditFindings.some(item => ["Critical", "High"].includes(item.severity)) ? "High" : highNulls.length ? "Medium" : "Low")
      };
    }

    function normalizePriorityColumns(items) {
      return (items || []).map(item => ({
        display_name: item.display_name || item.column_name || item.column || item.title || "Priority column",
        column_name: item.column_name || item.column || item.display_name || "",
        severity: item.severity || item.risk || "Medium",
        reason: item.reason || item.summary || item.description || "Review recommended."
      }));
    }

    function derivePriorityColumns(flagged, highNulls, auditFindings, outlierCols, factors) {
      const byName = new Map();
      function add(column, severity, reason, display) {
        if (!column || byName.has(column)) return;
        byName.set(column, { display_name: display || column, column_name: column, severity, reason });
      }
      flagged.forEach(profile => add(profile.column_name, "High", profile.fairness_flag?.reason || "Fairness or proxy review required.", profile.display_name));
      highNulls.forEach(profile => add(profile.column_name, "Medium", `${profile.null_pct}% null values may affect reliability.`, profile.display_name));
      outlierCols.forEach(item => add(item.column || item.column_name, item.severity || "Medium", item.reason || item.note || "Outlier review recommended."));
      auditFindings.forEach(item => add(item.column || item.column_name, item.severity || "Medium", item.description || item.reason || item.title));
      (factors || []).forEach(item => (item.detected || []).forEach(label => add(label.replace(/^Rows: /, "Dataset size"), item.readiness_impact || "Medium", item.impact || item.title || "Readiness review recommended.")));
      if (!byName.size) {
        (state.profiles || []).slice(0, 3).forEach(profile => add(profile.column_name, "Low", "Representative column to inspect for business meaning, target leakage, and documentation quality.", profile.display_name));
      }
      return Array.from(byName.values()).slice(0, 12);
    }

    function gradeScaleMarkup(readiness) {
      const scale = readiness.grade_scale || [
        { grade: "A", range: "90-100", label: "Production-ready" },
        { grade: "B", range: "80-89", label: "Good" },
        { grade: "C", range: "70-79", label: "Acceptable" },
        { grade: "D", range: "60-69", label: "Needs work" },
        { grade: "F", range: "Below 60", label: "Poor candidate for AI or analytics use" }
      ];
      return `<div class="grade-scale">${scale.map(row => `
        <div class="grade-row ${row.grade === readiness.grade ? "active" : ""}">
          <strong>${escapeHtml(row.grade)}</strong>
          <span>${escapeHtml(row.range)}</span>
          <span>${escapeHtml(row.label)}</span>
        </div>
      `).join("")}</div>`;
    }

    function readinessWhy(readiness) {
      const deductions = normalizeList(readiness.deductions);
      if (!deductions.length) return "No score deductions were returned, so the grade is driven by the score band shown below.";
      return `Grade ${readiness.grade || "N/A"} was assigned because the score landed at ${readiness.score ?? "N/A"}/100 after deductions for: ${deductions.join("; ")}.`;
    }

    function factorsMarkup(factors) {
      const rows = factors || [];
      if (!rows.length) return `<div class="empty">No readiness factors were returned.</div>`;
      return `<div class="factor-grid">${rows.map(item => `
        <article class="factor mini-card" data-expand>
          <strong>${escapeHtml(item.title || "Readiness factor")}</strong>
          <span>${escapeHtml(item.readiness_impact || item.impact || "Review")}</span>
          <p>${escapeHtml(previewText(item.impact && item.impact !== item.readiness_impact ? item.impact : (item.detected || []).join(", "), 130))}</p>
          <div class="detail">${escapeHtml((item.detected || []).join(", ") || item.impact || "Review recommended.")}</div>
        </article>
      `).join("")}</div>`;
    }

    function metricExplainer(kind, profile) {
      const name = profile.display_name || profile.column_name || "this column";
      const column = profile.column_name || name;
      const totalRows = Number(state.metadata?.row_count || 0);
      const missingPct = Number(profile.null_pct || 0);
      if (kind === "dtype") {
        return {
          title: "Data type",
          body: `${profile.dtype || "Unknown"} is the detected storage type for ${name}. DataLens reads the column values and infers whether they behave like numbers, text, dates, or mixed data.`
        };
      }
      if (kind === "nulls") {
        const approx = totalRows ? Math.round(totalRows * missingPct / 100) : "some";
        return {
          title: "Missing values",
          body: `${missingPct}% null means about ${approx} row(s) in ${column} are blank or unreadable. High missingness can reduce trust and model readiness.`
        };
      }
      if (kind === "unique") {
        return {
          title: "Unique values",
          body: `${profile.unique_count ?? 0} unique means DataLens counted that many distinct non-empty values in ${column}. Very high counts can indicate identifiers or values that need grouping.`
        };
      }
      return {
        title: "Business domain",
        body: `${profile.domain || "Unknown"} is the broad meaning DataLens assigned from the column name, sample shape, and AI dictionary description.`
      };
    }

    function uniqueBy(items, keyFn) {
      const seen = new Set();
      return (items || []).filter(item => {
        const key = keyFn(item);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function qualityExplanation(item) {
      return sentence(item.description || item.reason || item.note || item.detail, "This finding was returned by the quality audit and should be reviewed in the source data.");
    }

    function governanceControls() {
      const governance = state.governance || {};
      const explicit = governance.recommended_controls || governance.controls || [];
      if (explicit.length) return explicit;
      const controls = [];
      if (flaggedProfiles().length) controls.push("Review fairness-sensitive and proxy columns before automated decisions.");
      if ((governance.detected_pii || []).length) controls.push("Restrict access to personal data fields and document retention rules.");
      if (qualityFindings().length) controls.push("Fix high-severity quality findings before sharing or modeling.");
      controls.push("Keep a human review step for any decision-impacting use of this dataset.");
      return controls;
    }

    function governanceRisks() {
      const governance = state.governance || {};
      const explicit = governance.risks || governance.findings || [];
      if (explicit.length) return explicit;
      const risks = [];
      flaggedProfiles().slice(0, 5).forEach(profile => risks.push(`${profile.column_name}: ${profile.fairness_flag?.reason || "Fairness review recommended."}`));
      (governance.detected_pii || []).slice(0, 5).forEach(field => risks.push(`${field}: personal information may need privacy controls.`));
      qualityFindings().slice(0, 4).forEach(item => risks.push(`${item.title || item.column || "Quality issue"}: ${qualityExplanation(item)}`));
      if (!risks.length) risks.push("No major governance risks were returned; validate business context, consent, access control, and retention before operational use.");
      return risks;
    }

    function relationshipExplanation() {
      const numericCount = (state.profiles || []).filter(profile => String(profile.dtype || "").match(/int|float|number/i)).length;
      return `DataLens checks numeric relationship strength and near-duplicate columns. For this dataset, no pair crossed the display threshold for a strong correlation or near-duplicate match. It considered ${numericCount} numeric column(s) plus duplicate-like column comparisons where available.`;
    }

    function queryPlainAnswer(query) {
      const question = query.question || "Suggested question";
      if (/quality|issue|missing|null/i.test(question)) return "Use this as a plain-English review prompt for the quality section and Ask AI. It points you toward the fields most likely to need cleanup.";
      if (/sensitive|personal|governance|PII/i.test(question)) return "Use this to review which fields may contain personal information or need governance controls.";
      if (/readiness|score|trust/i.test(question)) return "Use this to understand why the readiness or trust score changed and which issues affected it.";
      if (/column|field/i.test(question)) return "Use this to understand what the dataset fields mean and which ones matter most.";
      return "Use this as a natural-language question to ask DataLens AI; no technical query writing is required.";
    }

    function faqQuestions() {
      return [
        "Why did this dataset get this grade?",
        "What should I fix first?",
        "Which columns need governance review?",
        "Is this dataset biased?",
        "Explain the biggest quality issue."
      ];
    }

    function renderStats() {
      const meta = state.metadata || {};
      const readiness = state.readiness || {};
      const insights = derivedInsights();
      document.getElementById("statGrid").innerHTML = `
        <article class="stat" data-pop-title="Rows" data-pop-body="The number of records DataLens read from the uploaded dataset. This dataset has ${escapeHtml(meta.row_count ?? 0)} rows."><span class="label">Rows</span><strong>${escapeHtml(meta.row_count ?? 0)}</strong></article>
        <article class="stat" data-pop-title="Columns" data-pop-body="The number of fields DataLens profiled. This dataset has ${escapeHtml(meta.column_count ?? 0)} columns."><span class="label">Columns</span><strong>${escapeHtml(meta.column_count ?? 0)}</strong></article>
        <article class="stat" data-pop-title="Readiness score" data-pop-body="${escapeHtml(readinessWhy(readiness))}"><span class="label">Readiness</span><strong>${escapeHtml(readiness.score ?? 0)}</strong></article>
        <article class="stat" data-pop-title="Flagged columns" data-pop-body="${escapeHtml(`${meta.flagged_column_count ?? 0} column(s) were marked for fairness, privacy, proxy, or governance review based on schema signals and verification metadata.`)}"><span class="label">Flagged</span><strong>${escapeHtml(meta.flagged_column_count ?? 0)}</strong></article>
        <article class="stat" data-pop-title="Review priority" data-pop-body="${escapeHtml(`Priority is derived from flagged columns, high-severity quality findings, and missingness. For this dataset it is ${insights.risk_level || "Medium"}.`)}"><span class="label">Review priority</span><strong class="${riskClass(insights.risk_level)}">${escapeHtml(insights.risk_level || "Medium")}</strong></article>
      `;
    }

    function renderOverview() {
      const readiness = state.readiness || {};
      const insights = derivedInsights();
      const providers = modelCoverage();
      const deductions = normalizeList(readiness.deductions).map(item => `<li>${escapeHtml(item)}</li>`).join("");
      const priorityRows = (insights.priority_columns || []).map(item => `
        <tr>
          <td>${escapeHtml(item.display_name)}</td>
          <td>${escapeHtml(item.column_name)}</td>
          <td><span class="badge ${String(item.severity || "Medium").toLowerCase()}">${escapeHtml(item.severity || "Medium")}</span></td>
          <td>${escapeHtml(item.reason)}</td>
        </tr>
      `).join("");

      document.getElementById("overviewPanel").innerHTML = `
        <div class="overview-band">
        <section class="score-card" data-score-card>
          <div class="score">${escapeHtml(readiness.score ?? 0)}</div>
          <div class="grade">Grade ${escapeHtml(readiness.grade || "N/A")}</div>
          <p>${escapeHtml(insights.summary || readiness.summary || "")}</p>
          <div class="provider-row">
            ${providerBadge("Gemini", providers.gemini)}
            ${providerBadge("Groq", providers.groq)}
          </div>
          <button class="soft-action" type="button" data-score-toggle>Show scoring detail</button>
          <div class="score-detail">
            <ul><li>${escapeHtml(readinessWhy(readiness))}</li></ul>
            <p style="margin-top:12px;">${escapeHtml(providers.text)}</p>
            <p style="margin-top:14px;font-weight:900;color:var(--cream);">Grade scale</p>
            ${gradeScaleMarkup(readiness)}
          </div>
        </section>
        <div class="overview-stack">
          <section class="panel">
            <h2>Recommended Next Actions</h2>
            ${expandableCards(insights.next_actions, "No recommended actions were returned.", 3)}
          </section>
          <div class="insight-grid">
            <section class="panel">
              <h2>Strengths</h2>
              ${expandableCards(insights.strengths, "No strengths were returned.", 2)}
            </section>
            <section class="panel">
              <h2>Concerns</h2>
              ${expandableCards(insights.concerns, "No concerns were returned.", 2)}
            </section>
          </div>
        </div>
        </div>
        <div class="overview-stack">
          <section class="panel">
            <h2>Readiness Deductions</h2>
            ${deductions ? `<ul class="insight-list">${deductions}</ul>` : `<div class="empty">No readiness deductions were applied.</div>`}
          </section>
          <section class="panel">
            <h2>Readiness Factors</h2>
            ${factorsMarkup(readiness.factors)}
          </section>
          <section class="panel">
            <h2>Priority Columns</h2>
            ${priorityRows ? `<div class="table-wrap"><table><thead><tr><th>Display name</th><th>Column</th><th>Severity</th><th>Reason</th></tr></thead><tbody>${priorityRows}</tbody></table></div>` : `<div class="empty">No columns were returned for prioritisation.</div>`}
          </section>
        </div>
      `;
    }

    function renderColumns() {
      const grid = document.getElementById("columnGrid");
      grid.innerHTML = (state.profiles || []).map((profile, index) => {
        const flag = profile.fairness_flag;
        const groq = flag && flag.groq_verification;
        const dtypeInfo = metricExplainer("dtype", profile);
        const nullInfo = metricExplainer("nulls", profile);
        const uniqueInfo = metricExplainer("unique", profile);
        const domainInfo = metricExplainer("domain", profile);
        return `
          <article class="column-card">
            <div class="column-head">
              <h2 contenteditable="true" data-index="${index}" data-field="display_name">${escapeHtml(profile.display_name || profile.column_name)}</h2>
              <span class="badge ${confidenceClass(profile.confidence)}">${escapeHtml(profile.confidence === "Single model" ? "Model review" : (profile.confidence || "Fallback"))}</span>
            </div>
            <div class="meta">
              <button class="info-chip" type="button" data-pop-title="${escapeHtml(dtypeInfo.title)}" data-pop-body="${escapeHtml(dtypeInfo.body)}">${escapeHtml(profile.dtype)}</button>
              <button class="info-chip" type="button" data-pop-title="${escapeHtml(nullInfo.title)}" data-pop-body="${escapeHtml(nullInfo.body)}">${escapeHtml(profile.null_pct)}% null</button>
              <button class="info-chip" type="button" data-pop-title="${escapeHtml(uniqueInfo.title)}" data-pop-body="${escapeHtml(uniqueInfo.body)}">${escapeHtml(profile.unique_count)} unique</button>
              ${profile.domain ? `<button class="info-chip" type="button" data-pop-title="${escapeHtml(domainInfo.title)}" data-pop-body="${escapeHtml(domainInfo.body)}">${escapeHtml(profile.domain)}</button>` : ""}
            </div>
            <div class="description" contenteditable="true" data-index="${index}" data-field="description">${escapeHtml(profile.description || "No description returned.")}</div>
            ${profile.data_quality_note ? `<div class="notice info">${escapeHtml(profile.data_quality_note)}</div>` : ""}
            ${profile.anomaly_note ? `<div class="notice warn">${escapeHtml(profile.anomaly_note)}</div>` : ""}
            ${flag ? `<div class="notice danger">${escapeHtml(flag.eu_ai_act_article || "Governance review")}: ${escapeHtml(flag.reason || "")}</div>` : ""}
            ${groq ? `<div class="notice warn">Verification: ${escapeHtml(groq.verdict || "Uncertain")} - ${escapeHtml(groq.reason || "")}</div>` : ""}
            ${profile.groq_description ? `<div class="notice info">Second opinion: ${escapeHtml(profile.groq_description)}</div>` : ""}
            <div class="notice info">Model path: Gemini dictionary draft${profile.groq_description || groq ? " + Groq second-pass review." : " with Groq verification shown when returned by the backend."}</div>
          </article>
        `;
      }).join("") || `<div class="empty">No column profiles were returned.</div>`;
    }

    function renderQuality() {
      const audit = state.quality_audit || {};
      const findings = uniqueBy(qualityFindings(), item => `${item.severity || ""}-${item.title || item.column || item.column_name || ""}-${qualityExplanation(item)}`);
      const findingCards = findings.map(item => `
        <article class="mini-card" data-expand>
          <strong>${escapeHtml(item.title || item.column || item.column_name || "Quality finding")}</strong>
          <p>${escapeHtml(item.severity || item.category || "Review")} priority</p>
          <div class="detail">${escapeHtml(qualityExplanation(item))}</div>
        </article>
      `).join("");
      const outliers = uniqueBy(audit.outliers || [], item => `${item.column || item.column_name || ""}-${item.reason || item.note || ""}`);
      const outlierCards = outliers.map(item => `
        <article class="mini-card" data-expand>
          <strong>${escapeHtml(item.column || item.column_name || "Column")}</strong>
          <p>${escapeHtml(item.rate || item.outlier_pct || "Outlier pattern detected")}</p>
          <div class="detail">${escapeHtml(item.reason || item.note || "DataLens marked this column because values appear unusually far from the rest of the column distribution.")}</div>
        </article>
      `).join("");
      document.getElementById("qualityPanel").innerHTML = `
        <section class="panel">
          <h2>Quality Audit</h2>
          <p>${escapeHtml(audit.summary || state.story?.quality_summary || "Quality checks are shown below when returned by the analysis engine.")}</p>
          ${findingCards ? `<div class="overview-list">${findingCards}</div>` : `<div class="empty">No quality findings were returned. That means the audit did not find a displayed rule violation, but business validation is still recommended.</div>`}
        </section>
        <section class="panel">
          <h2>Outlier Signals</h2>
          ${outlierCards ? `<div class="overview-list">${outlierCards}</div>` : `<div class="empty">No outlier signals were returned. DataLens did not find values extreme enough to display in this section.</div>`}
        </section>
      `;
    }

    function renderGovernance() {
      const governance = state.governance || {};
      const health = state.health || {};
      const pii = governance.detected_pii || [];
      const controls = governanceControls();
      const risks = governanceRisks();
      const trust = (health.overall_trust || {}).score ?? health.score ?? "N/A";
      const flaggedCount = flaggedProfiles().length;
      document.getElementById("governancePanel").innerHTML = `
        <section class="panel">
          <h2>Governance Summary</h2>
          <p>${escapeHtml(governance.summary || state.story?.governance_summary || "Governance signals combine fairness flags, personal information review, and quality readiness.")}</p>
          <div class="provider-row">
            ${explainableBadge(`Trust ${trust}`, "Trust score", `This score summarizes reliability and governance readiness for this dataset. It is influenced by quality findings, fairness flags, readiness deductions, and governance signals returned by the backend.`, "neutral")}
            ${explainableBadge(`${flaggedCount} flagged columns`, "Flagged columns", `${flaggedCount} column(s) were marked because they may contain personal, protected, proxy, or governance-sensitive information.`, flaggedCount ? "high" : "low")}
          </div>
        </section>
        <div class="insight-grid">
          <section class="panel"><h2>Detected <span data-tip="Personally Identifiable Information">PII</span></h2>${expandableCards(pii, "No personal information fields were returned.", 6)}</section>
          <section class="panel"><h2>Controls</h2>${expandableCards(controls, "DataLens did not receive explicit controls, so use the review recommendations shown here.", 4)}</section>
        </div>
        <section class="panel"><h2>Governance Risks</h2>${expandableCards(risks, "DataLens did not receive explicit governance risks, so validate consent, access, retention, and business context before use.", 4)}</section>
      `;
    }

    function renderRelationships() {
      const relationshipRows = (state.relationships || []).map(rel => `
        <tr>
          <td>${escapeHtml(rel.col_a)}</td>
          <td>${escapeHtml(rel.col_b)}</td>
          <td>${escapeHtml(rel.correlation)}</td>
          <td>${escapeHtml(rel.type)}</td>
          <td>${escapeHtml(rel.note)}</td>
        </tr>
      `).join("");
      const redundantRows = (state.redundant_columns || []).map(rel => `
        <tr>
          <td>${escapeHtml(rel.col_a)}</td>
          <td>${escapeHtml(rel.col_b)}</td>
          <td>${escapeHtml(rel.match_pct)}% match</td>
          <td>Near duplicate</td>
          <td>${escapeHtml(rel.note)}</td>
        </tr>
      `).join("");
      const rows = relationshipRows + redundantRows;
      document.getElementById("relationshipsPanel").innerHTML = rows ? `
        <h2>Detected Relationships</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Column A</th><th>Column B</th><th>Signal</th><th>Type</th><th>Interpretation</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      ` : `<article class="mini-card" data-expand>
        <strong>No strong numeric relationships or near-duplicate columns were detected.</strong>
        <p>Click to see how DataLens reached that conclusion.</p>
        <div class="detail">${escapeHtml(relationshipExplanation())}</div>
      </article>`;
    }

    function renderQueries() {
      const grid = document.getElementById("queryGrid");
      grid.innerHTML = (state.query_suggestions || []).map((query, index) => `
        <article class="query-card mini-card" data-expand>
          <strong>${escapeHtml(query.question || `Suggested query ${index + 1}`)}</strong>
          <div class="plain-answer">${escapeHtml(queryPlainAnswer(query))}</div>
          <div class="detail">This is a ready-made question you can ask the AI assistant or use during review. Technical query code is intentionally hidden from this non-technical view.</div>
        </article>
      `).join("") || `<div class="empty">No query suggestions were returned.</div>`;
    }

    function renderChat() {
      const log = document.getElementById("chatLog");
      const faq = document.getElementById("faqRow");
      if (faq) {
        faq.innerHTML = faqQuestions().map(q => `<button type="button" class="info-chip" data-faq="${escapeHtml(q)}">${escapeHtml(q)}</button>`).join("");
      }
      if (!log) return;
      if (!chatHistory.length) {
        log.innerHTML = `
          <div class="message assistant">
            Ask AI is ready. Choose a question above or ask in your own words.
            <div class="meta-line">
              <span class="badge on">Gemini</span>
              <span class="badge on">Groq</span>
            </div>
          </div>`;
        return;
      }
      log.innerHTML = chatHistory.map(message => `
        <div class="message ${message.role === "user" ? "user" : "assistant"} ${message.thinking ? "thinking" : ""}">
          ${message.thinking ? "" : (message.role === "assistant" ? formatAiText(message.text) : escapeHtml(message.text))}
          ${message.meta ? `<div class="meta-line">
            <span class="badge neutral">${escapeHtml(message.meta.source || "DataLens")}</span>
            <span class="badge ${message.meta.groq_verified ? "on" : "neutral"}">Groq ${message.meta.groq_verified ? "verified" : "available"}</span>
            <span class="badge ${message.meta.models?.gemini ? "on" : "neutral"}">Gemini</span>
          </div>` : ""}
        </div>
      `).join("");
      log.scrollTop = log.scrollHeight;
    }

    async function askAi(question) {
      if (!question.trim() || !state) return;
      chatHistory.push({ role: "user", text: question.trim() });
      chatHistory.push({ role: "assistant", text: "Thinking through the audit evidence...", thinking: true });
      renderChat();
      try {
        const response = await fetch("/dictionary/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            question,
            session_id: state.metadata?.session_id,
            result: state
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "Ask AI failed");
        chatHistory.pop();
        chatHistory.push({
          role: "assistant",
          text: data.answer || "No answer returned.",
          meta: data
        });
      } catch (error) {
        chatHistory.pop();
        chatHistory.push({ role: "assistant", text: error.message || "Ask AI could not answer this question." });
      }
      renderChat();
    }

    function render() {
      if (!state) {
        document.querySelector("main").innerHTML = `<section class="empty">No DataLens result found. Go back to the upload screen and analyse a dataset.</section>`;
        return;
      }
      const title = state.metadata?.filename || "DataLens Results";
      document.getElementById("title").textContent = title;
      document.getElementById("sideTitle").textContent = title;
      renderStats();
      renderOverview();
      renderColumns();
      renderQuality();
      renderGovernance();
      renderRelationships();
      renderQueries();
      renderChat();
    }

    async function loadStateFromUrl() {
      const sessionId = new URLSearchParams(window.location.search).get("session_id");
      if (!sessionId) return;
      if (state?.metadata?.session_id === sessionId) return;
      try {
        const response = await fetch(`/dictionary/export/${encodeURIComponent(sessionId)}/json`, { credentials: "same-origin" });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.detail || "Could not load this history result.");
        state = payload.analysis || payload;
        persist();
      } catch (error) {
        state = null;
        document.querySelector("main").innerHTML = `<section class="empty"><strong>Could not load this result.</strong>${escapeHtml(error.message || "The cached result may no longer be available. Run the analysis again to refresh it.")}</section>`;
      }
    }

    document.addEventListener("click", event => {
      const oldPopover = document.querySelector(".inline-popover");
      const popTarget = event.target.closest("[data-pop-title]");
      if (oldPopover && !popTarget) oldPopover.remove();

      if (popTarget) {
        event.stopPropagation();
        oldPopover?.remove();
        const rect = popTarget.getBoundingClientRect();
        const popover = document.createElement("div");
        popover.className = "inline-popover";
        popover.innerHTML = `<strong>${escapeHtml(popTarget.dataset.popTitle)}</strong><p>${escapeHtml(popTarget.dataset.popBody)}</p>`;
        document.body.appendChild(popover);
        const left = Math.min(window.innerWidth - popover.offsetWidth - 16, Math.max(16, rect.left));
        const top = Math.min(window.innerHeight - popover.offsetHeight - 16, rect.bottom + 10);
        popover.style.left = `${left}px`;
        popover.style.top = `${top}px`;
        return;
      }

      const expandable = event.target.closest("[data-expand]");
      if (expandable) {
        expandable.classList.toggle("expanded");
        return;
      }

      const scoreToggle = event.target.closest("[data-score-toggle]");
      if (scoreToggle) {
        const card = scoreToggle.closest("[data-score-card]");
        const expanded = card.classList.toggle("expanded");
        scoreToggle.textContent = expanded ? "Hide scoring detail" : "Show scoring detail";
        return;
      }

      const faqButton = event.target.closest("[data-faq]");
      if (faqButton) {
        askAi(faqButton.dataset.faq || "");
        return;
      }

      const tab = event.target.closest("[data-tab]");
      if (tab) {
        document.querySelectorAll(".tab, .view").forEach(el => el.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.tab).classList.add("active");
      }

      const exportButton = event.target.closest("[data-export]");
      if (exportButton && state?.metadata?.session_id) {
        fetch(`/export/${state.metadata.session_id}/${exportButton.dataset.export}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(state)
        })
          .then(response => {
            if (!response.ok) throw new Error("Export failed");
            return response.blob();
          })
          .then(blob => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `datalens_${state.metadata.session_id}.${exportButton.dataset.export === "excel" ? "xlsx" : exportButton.dataset.export}`;
            link.click();
            URL.revokeObjectURL(url);
          })
          .catch(err => alert(err.message));
      }

    });

    document.getElementById("chatForm").addEventListener("submit", event => {
      event.preventDefault();
      const input = document.getElementById("chatQuestion");
      const question = input.value;
      input.value = "";
      askAi(question);
    });

    document.addEventListener("blur", event => {
      const editable = event.target.closest("[contenteditable][data-index]");
      if (!editable) return;
      const profile = state.profiles[Number(editable.dataset.index)];
      profile[editable.dataset.field] = editable.textContent.trim();
      state.insights = state.insights || {};
      persist();
    }, true);

    loadStateFromUrl().then(render);

    const canvas = document.getElementById("resultMesh");
    const ctx = canvas.getContext("2d");
    let shards = [];
    function resizeMesh() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      shards = Array.from({ length: 52 }, (_, index) => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: (12 + Math.random() * 34) * devicePixelRatio,
        turn: Math.random() * Math.PI,
        speed: (.0018 + Math.random() * .004) * (index % 2 ? 1 : -1),
        color: ["rgba(0,166,200,.16)", "rgba(167,209,41,.2)", "rgba(255,107,74,.15)", "rgba(124,92,255,.14)"][index % 4]
      }));
    }
    function drawMesh() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      shards.forEach(shard => {
        shard.turn += shard.speed;
        ctx.save();
        ctx.translate(shard.x, shard.y);
        ctx.rotate(shard.turn);
        ctx.fillStyle = shard.color;
        ctx.fillRect(-shard.size / 2, -shard.size / 2, shard.size, shard.size * .18);
        ctx.restore();
      });
      requestAnimationFrame(drawMesh);
    }
    resizeMesh();
    drawMesh();
    window.addEventListener("resize", resizeMesh);
  </script>
</body>
</html>
