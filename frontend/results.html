<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataLens Dictionary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .app-shell {
      display: grid;
      grid-template-columns: 256px minmax(0, 1fr);
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 20px 16px;
      border-right: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(20px) saturate(140%);
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-family: var(--font-heading);
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      padding: 4px 0;
    }

    .sidebar-brand::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--primary));
      flex-shrink: 0;
    }

    .dataset-chip {
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .dataset-chip .chip-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--faint);
      margin-bottom: 5px;
    }

    .dataset-chip strong {
      display: block;
      font-size: 0.88rem;
      overflow-wrap: anywhere;
      line-height: 1.3;
      color: var(--text);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .sidebar-tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .sidebar-tab:hover {
      background: var(--surface-soft);
      color: var(--text);
      transform: none;
      box-shadow: none;
    }

    .sidebar-tab.active {
      background: var(--primary-soft);
      border-color: rgba(53, 87, 232, 0.22);
      color: var(--primary);
    }

    .tab-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border-strong);
      flex-shrink: 0;
    }

    .sidebar-tab.active .tab-dot { background: var(--primary); }

    .export-group {
      display: grid;
      gap: 7px;
    }

    .export-group .exp-label {
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--faint);
    }

    .export-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .export-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
      transform: translateY(-1px);
      box-shadow: none;
    }

    /* ── Main ── */
    .main-content {
      min-width: 0;
      padding: 32px clamp(18px, 3vw, 44px) 56px;
    }

    .results-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .results-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--teal);
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .results-eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .results-header h1 {
      margin: 0;
      font-family: var(--font-heading);
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.02;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .stat-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .stat-pill {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      min-width: 110px;
      text-align: center;
    }

    .stat-pill .s-label {
      display: block;
      font-size: 0.69rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--faint);
      margin-bottom: 4px;
    }

    .stat-pill .s-value {
      display: block;
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; animation: rise 320ms ease both; }

    /* ── Column grid ── */
    .column-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .column-card {
      position: relative;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      animation: rise 420ms ease both;
    }

    .column-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--teal));
      transform: scaleX(0.3);
      transform-origin: left;
      transition: transform 220ms ease;
    }

    .column-card:hover {
      transform: translateY(-3px);
      border-color: rgba(53, 87, 232, 0.3);
      box-shadow: var(--shadow);
    }

    .column-card:hover::before { transform: scaleX(1); }

    .col-name {
      margin: 10px 0 10px;
      font-family: var(--font-heading);
      font-size: 1.12rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
      color: var(--text);
    }

    .col-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .meta-tag {
      font-size: 0.72rem;
      background: var(--surface-soft);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 9px;
      font-weight: 800;
    }

    .col-description {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.55;
      min-height: 52px;
    }

    [contenteditable="true"] {
      outline: none;
      border-radius: 6px;
      padding: 2px 4px;
      margin: -2px -4px;
    }

    [contenteditable="true"]:focus {
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 3px rgba(53, 87, 232, 0.14);
    }

    .conf-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .conf-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .conf-badge.confirmed { background: var(--success-soft); color: var(--success); }
    .conf-badge.review    { background: var(--warning-soft); color: var(--warning); }
    .conf-badge.fallback  { background: var(--surface-soft); color: var(--muted); }

    .verify-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .verify-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .verify-pill.ok   { background: var(--teal-soft); color: var(--teal); }
    .verify-pill.warn { background: var(--warning-soft); color: var(--warning); }

    .col-banner {
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.45;
      font-weight: 600;
    }

    .col-banner.amber { background: var(--warning-soft); color: #7c4a00; }
    .col-banner.red   { background: var(--danger-soft);  color: var(--danger); }

    /* ── Relationships ── */
    .table-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    tr.highlight td { background: var(--warning-soft); }

    /* ── Overview ── */
    .overview-grid {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .score-card {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .score-value {
      font-family: var(--font-heading);
      font-size: 5rem;
      font-weight: 800;
      line-height: 0.9;
      color: var(--text);
      margin-bottom: 14px;
    }

    .score-grade {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.84rem;
      margin-bottom: 14px;
    }

    .score-grade.pass { background: var(--success-soft); color: var(--success); }
    .score-grade.warn { background: var(--warning-soft); color: var(--warning); }
    .score-grade.fail { background: var(--danger-soft);  color: var(--danger); }

    .score-summary {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .deduction-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.65;
    }

    .query-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .query-card {
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      animation: rise 380ms ease both;
    }

    .query-title {
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .query-lang {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0 5px;
    }

    .query-lang span {
      font-size: 0.69rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--faint);
    }

    .copy-btn {
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 800;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--muted);
      cursor: pointer;
      min-height: unset;
      transition: background 140ms ease, color 140ms ease;
    }

    .copy-btn:hover {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: rgba(53, 87, 232, 0.3);
      transform: none;
      box-shadow: none;
    }

    pre {
      margin: 0;
      padding: 10px 12px;
      overflow-x: auto;
      border-radius: 6px;
      background: #1e2433;
      color: #e2e8f0;
      font: 12px/1.55 "Cascadia Code", Consolas, monospace;
    }

    /* ── Responsive ── */
    @media (max-width: 980px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: relative;
        height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-brand { flex: 1; }
      .dataset-chip  { display: none; }
      .sidebar-nav   { flex-direction: row; flex: none; }
      .sidebar-tab   { min-height: 36px; font-size: 0.82rem; }
      .export-group  { flex-direction: row; align-items: center; gap: 6px; }
      .exp-label     { display: none; }
      .overview-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .results-header { flex-direction: column; align-items: stretch; }
      .stat-strip     { justify-content: flex-start; }
      .sidebar-nav    { flex-wrap: wrap; }
      .main-content   { padding: 20px 16px 40px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <a class="sidebar-brand" href="/">DataLens Studio</a>
      <div class="dataset-chip">
        <span class="chip-label">Active dataset</span>
        <strong id="sideTitle">No dataset loaded</strong>
      </div>
      <nav class="sidebar-nav" aria-label="Result tabs">
        <button class="sidebar-tab active" data-tab="columns">Columns <span class="tab-dot"></span></button>
        <button class="sidebar-tab" data-tab="relationships">Relations <span class="tab-dot"></span></button>
        <button class="sidebar-tab" data-tab="overview">Overview <span class="tab-dot"></span></button>
      </nav>
      <div class="export-group">
        <span class="exp-label">Export</span>
        <button class="export-btn" data-export="pdf">PDF</button>
        <button class="export-btn" data-export="excel">Excel</button>
        <button class="export-btn" data-export="json">JSON</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="results-header">
        <div>
          <div class="results-eyebrow">Editable intelligent dictionary · Gemini drafted, Groq verified</div>
          <h1 id="title">DataLens Results</h1>
        </div>
        <div class="stat-strip" id="statStrip"></div>
      </div>

      <section id="columns" class="view active">
        <div id="columnGrid" class="column-grid"></div>
      </section>

      <section id="relationships" class="view">
        <div class="table-panel">
          <div class="table-wrap">
            <div id="relationshipsTable"></div>
          </div>
        </div>
      </section>

      <section id="overview" class="view">
        <div class="overview-grid" id="overviewPanel"></div>
      </section>
    </main>

  </div>
  <script>
    let state = JSON.parse(sessionStorage.getItem("datalensResult") || localStorage.getItem("datalensResult") || "null");

    function esc(v) {
      return String(v ?? "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));
    }

    function persist() { sessionStorage.setItem("datalensResult", JSON.stringify(state)); }

    function confClass(v) {
      if (v === "Confirmed") return "confirmed";
      if (v === "Review needed") return "review";
      return "fallback";
    }

    function gradeClass(s) {
      return s >= 75 ? "pass" : s >= 50 ? "warn" : "fail";
    }

    function renderStats() {
      const meta = state.metadata || {};
      const r    = state.readiness || {};
      document.getElementById("statStrip").innerHTML = `
        <div class="stat-pill"><span class="s-label">Rows</span><span class="s-value">${esc(meta.row_count ?? 0)}</span></div>
        <div class="stat-pill"><span class="s-label">Columns</span><span class="s-value">${esc(meta.column_count ?? 0)}</span></div>
        <div class="stat-pill"><span class="s-label">Readiness</span><span class="s-value">${esc(r.score ?? 0)}</span></div>
      `;
    }

    function renderColumns() {
      document.getElementById("columnGrid").innerHTML = (state.profiles || []).map((p, i) => {
        const flag = p.fairness_flag;
        const groq = flag?.groq_verification;
        return `
          <article class="column-card" style="animation-delay:${Math.min(i * 35, 400)}ms">
            <span class="conf-badge ${confClass(p.confidence)}">${esc(p.confidence || "Fallback")}</span>
            <h2 class="col-name" contenteditable="true" data-index="${i}" data-field="display_name">${esc(p.display_name || p.column_name)}</h2>
            <div class="col-meta">
              <span class="meta-tag">${esc(p.dtype)}</span>
              <span class="meta-tag">${esc(p.null_pct)}% null</span>
              <span class="meta-tag">${esc(p.unique_count)} unique</span>
            </div>
            <div class="col-description" contenteditable="true" data-index="${i}" data-field="description">${esc(p.description || "")}</div>
            ${flag ? `<div class="verify-strip"><span class="verify-pill ${flag.verification_status === "Confirmed" ? "ok" : "warn"}">${esc(groq ? `${groq.verdict || "Uncertain"} · Groq` : "Groq pending")}</span></div>` : ""}
            ${p.anomaly_note ? `<div class="col-banner amber">${esc(p.anomaly_note)}</div>` : ""}
            ${flag && (flag.is_sensitive || flag.is_proxy) ? `<div class="col-banner red">${esc(flag.eu_ai_act_article || "EU AI Act")} — ${esc(flag.reason || "")}</div>` : ""}
            ${groq?.reason ? `<div class="col-banner amber">Groq: ${esc(groq.reason)}</div>` : ""}
          </article>`;
      }).join("");
    }

    function renderRelationships() {
      const rows =
        (state.relationships || []).map(r => `
          <tr class="${Math.abs(Number(r.correlation || 0)) > 0.9 ? "highlight" : ""}">
            <td>${esc(r.col_a)}</td><td>${esc(r.col_b)}</td>
            <td>${esc(r.correlation)}</td><td>${esc(r.type)}</td><td>${esc(r.note)}</td>
          </tr>`) .join("") +
        (state.redundant_columns || []).map(r => `
          <tr class="highlight">
            <td>${esc(r.col_a)}</td><td>${esc(r.col_b)}</td>
            <td>${esc(r.match_pct)}% match</td><td>Near duplicate</td><td>${esc(r.note)}</td>
          </tr>`).join("");
      document.getElementById("relationshipsTable").innerHTML = `
        <table>
          <thead><tr><th>Column A</th><th>Column B</th><th>Correlation</th><th>Type</th><th>Note</th></tr></thead>
          <tbody>${rows || `<tr><td colspan="5" style="color:var(--muted)">No strong relationships detected.</td></tr>`}</tbody>
        </table>`;
    }

    function renderOverview() {
      const r     = state.readiness || {};
      const score = r.score ?? 0;
      const deductions = (r.deductions || []).map(d => `<li>${esc(d.reason)} (${esc(d.points)} pts)</li>`).join("");
      const queryCards = (state.query_suggestions || []).map((q, i) => `
        <article class="query-card" style="animation-delay:${Math.min(i * 45, 360)}ms">
          <div class="query-title">${esc(q.question)}</div>
          <div class="query-lang"><span>pandas</span><button class="copy-btn" data-copy="${esc(q.pandas_query)}">Copy</button></div>
          <pre>${esc(q.pandas_query)}</pre>
          <div class="query-lang"><span>SQL</span><button class="copy-btn" data-copy="${esc(q.sql_query)}">Copy</button></div>
          <pre>${esc(q.sql_query)}</pre>
        </article>`).join("");
      document.getElementById("overviewPanel").innerHTML = `
        <section class="score-card">
          <div class="score-value">${esc(score)}</div>
          <div class="score-grade ${gradeClass(score)}">Grade ${esc(r.grade || "N/A")}</div>
          <p class="score-summary">${esc(r.summary || "")}</p>
          <ul class="deduction-list">${deductions || "<li>No deductions.</li>"}</ul>
        </section>
        <section>
          <div class="query-grid">${queryCards || `<div class="empty-state">No query suggestions returned.</div>`}</div>
        </section>`;
    }

    function render() {
      if (!state) {
        document.querySelector(".main-content").innerHTML = `<div class="empty-state">No DataLens result found. <a href="/">Go back to upload</a> and analyse a dataset.</div>`;
        return;
      }
      const title = state.metadata?.filename || "DataLens Results";
      document.getElementById("title").textContent = title;
      document.getElementById("sideTitle").textContent = title;
      renderStats();
      renderColumns();
      renderRelationships();
      renderOverview();
    }

    document.addEventListener("click", e => {
      const tab = e.target.closest("[data-tab]");
      if (tab) {
        document.querySelectorAll(".sidebar-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.tab).classList.add("active");
      }

      const copy = e.target.closest("[data-copy]");
      if (copy) navigator.clipboard.writeText(copy.dataset.copy || "");

      const exp = e.target.closest("[data-export]");
      if (exp && state?.metadata?.session_id) {
        fetch(`/export/${state.metadata.session_id}/${exp.dataset.export}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(state)
        }).then(r => r.blob()).then(blob => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `datalens_${state.metadata.session_id}.${exp.dataset.export === "excel" ? "xlsx" : exp.dataset.export}`;
          a.click();
        });
      }
    });

    document.addEventListener("blur", e => {
      const el = e.target.closest("[contenteditable][data-index]");
      if (!el) return;
      state.profiles[Number(el.dataset.index)][el.dataset.field] = el.textContent.trim();
      persist();
    }, true);

    render();
  </script>
</body>
</html>
